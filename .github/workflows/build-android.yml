name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Install npm dependencies
      working-directory: cryptomax-android
      run: npm install

    - name: Sync Capacitor
      working-directory: cryptomax-android
      run: npx cap sync android

    - name: Chmod Gradle
      working-directory: cryptomax-android/android
      run: chmod +x gradlew

    - name: Build debug APK
      if: inputs.build_type == 'debug'
      working-directory: cryptomax-android/android
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Build release APK
      if: inputs.build_type == 'release'
      working-directory: cryptomax-android/android
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Upload debug APK
      if: inputs.build_type == 'debug'
      uses: actions/upload-artifact@v4
      with:
        name: cryptomax-debug-apk
        path: cryptomax-android/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Upload release APK
      if: inputs.build_type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: cryptomax-release-apk
        path: cryptomax-android/android/app/build/outputs/apk/release/*.apk
        retention-days: 90
