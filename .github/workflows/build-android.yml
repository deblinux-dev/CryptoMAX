name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Leave empty for no release.'
        required: false
        default: ''
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: cryptomax-android
        run: npm install

      - name: Sync Capacitor
        working-directory: cryptomax-android
        run: npx cap sync android

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build debug APK
        if: inputs.build_type == 'debug'
        working-directory: cryptomax-android/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        if: inputs.build_type == 'release'
        working-directory: cryptomax-android/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        if: inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: cryptomax-debug-apk
          path: cryptomax-android/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK
        if: inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: cryptomax-release-apk
          path: cryptomax-android/android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.event.inputs.release_tag != '' && inputs.build_type == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: CryptoMAX ${{ github.event.inputs.release_tag }}
          generate_release_notes: true
          files: |
            cryptomax-android/android/app/build/outputs/apk/release/*.apk