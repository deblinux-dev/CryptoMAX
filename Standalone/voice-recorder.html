<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CryptoMAX — Защищённая запись голосового</title>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 100%; height: 100%;
        background: #0b0d13; color: #e4e6eb;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
        user-select: none;
    }
    body {
        display: flex; flex-direction: column;
        padding: 20px; gap: 16px;
    }
    .header {
        display: flex; align-items: center; gap: 10px;
        padding-bottom: 12px; border-bottom: 1px solid #2a2e3d;
    }
    .header svg { width: 22px; height: 22px; color: #00d26a; flex-shrink: 0; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .chat { font-size: 11px; color: #8b8fa3; margin-left: auto; }
    .status {
        font-size: 12px; color: #8b8fa3; text-align: center;
        min-height: 16px;
    }
    .status.error { color: #ff6b6b; }
    .status.success { color: #00d26a; }
    .record-area {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px;
    }
    .timer {
        font-size: 42px; font-weight: 300; font-variant-numeric: tabular-nums;
        color: #e4e6eb; letter-spacing: 2px;
    }
    .timer.recording { color: #ff6b6b; animation: pulse 1.5s ease infinite; }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
    }
    .record-btn {
        width: 80px; height: 80px; border-radius: 50%;
        border: none; cursor: pointer;
        background: #00d26a; color: #fff;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.2s ease;
        box-shadow: 0 4px 20px rgba(0, 210, 106, 0.4);
    }
    .record-btn:hover { transform: scale(1.05); }
    .record-btn:active { transform: scale(0.95); }
    .record-btn.recording {
        background: #ff3b30;
        box-shadow: 0 4px 20px rgba(255, 59, 48, 0.4);
        animation: recPulse 1s ease infinite;
    }
    @keyframes recPulse {
        0%, 100% { box-shadow: 0 4px 20px rgba(255, 59, 48, 0.4); }
        50% { box-shadow: 0 4px 30px rgba(255, 59, 48, 0.7); }
    }
    .record-btn svg { width: 32px; height: 32px; }
    .controls {
        display: flex; gap: 10px; justify-content: center;
        padding-top: 12px; border-top: 1px solid #2a2e3d;
    }
    .btn {
        padding: 10px 20px; border-radius: 6px; border: 1px solid #2a2e3d;
        background: #161922; color: #c8cad0;
        font-size: 13px; font-weight: 500; cursor: pointer;
        transition: all 0.15s ease; font-family: inherit;
        display: flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: #1e2230; border-color: #3a3e4d; color: #e4e6eb; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: #00a854; border-color: #00a854; color: #fff; }
    .btn.primary:hover { background: #00d26a; border-color: #00d26a; }
    .btn.danger { border-color: #ff3b30; color: #ff6b6b; }
    .btn.danger:hover { background: rgba(255,59,48,0.1); }
    .btn svg { width: 14px; height: 14px; }
    .preview {
        display: none; flex-direction: column; gap: 12px;
        align-items: center; width: 100%;
    }
    .preview.show { display: flex; }
    .preview audio { width: 100%; max-width: 400px; }
    .privacy-note {
        font-size: 11px; color: #5c6070; text-align: center;
        line-height: 1.4;
    }
    .privacy-note strong { color: #00d26a; }
</style>
</head>
<body>

<div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <h1>Защищённая запись голосового</h1>
    <span class="chat" id="chatInfo">Чат: —</span>
</div>

<div class="status" id="status">Готово к записи</div>

<div class="record-area" id="recordArea">
    <div class="timer" id="timer">0:00</div>
    <button class="record-btn" id="recordBtn" title="Начать запись">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <div class="preview" id="preview">
        <audio id="audioPreview" controls></audio>
    </div>
</div>

<div class="privacy-note">
    <strong>🔒 Изолированная запись:</strong> аудио записывается в этом окне и
    шифруется (AES-256-GCM) перед отправкой. web.max.ru получает только
    зашифрованные данные.
</div>

<div class="controls">
    <button class="btn" id="cancelBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Отмена
    </button>
    <button class="btn danger" id="discardBtn" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg>
        Перезаписать
    </button>
    <button class="btn primary" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Зашифровать и отправить
    </button>
</div>

<script>
(function() {
    'use strict';

    const { ipcRenderer } = require('electron');

    const statusEl = document.getElementById('status');
    const timerEl = document.getElementById('timer');
    const recordBtn = document.getElementById('recordBtn');
    const previewEl = document.getElementById('preview');
    const audioPreview = document.getElementById('audioPreview');
    const cancelBtn = document.getElementById('cancelBtn');
    const discardBtn = document.getElementById('discardBtn');
    const sendBtn = document.getElementById('sendBtn');
    const chatInfo = document.getElementById('chatInfo');

    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let recordSeconds = 0;
    let timerInterval = null;
    let recordedBlob = null;
    let recordedBytes = null;

    // Получить информацию о чате от main process
    ipcRenderer.invoke('voice-recorder-get-context').then(function(ctx) {
        if (ctx && ctx.chatId) {
            chatInfo.textContent = 'Чат: ' + ctx.chatId;
        }
        if (ctx && ctx.error) {
            statusEl.textContent = ctx.error;
            statusEl.className = 'status error';
            recordBtn.disabled = true;
        }
    });

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function getSupportedMime() {
        const types = [
            'audio/ogg;codecs=opus',
            'audio/ogg',
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/mp4',
        ];
        for (const t of types) {
            if (MediaRecorder.isTypeSupported(t)) return t;
        }
        return '';
    }

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mime = getSupportedMime();
            const opts = mime ? { mimeType: mime } : {};
            mediaRecorder = new MediaRecorder(stream, opts);
            audioChunks = [];

            mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = async function() {
                stream.getTracks().forEach(t => t.stop());
                recordedBlob = new Blob(audioChunks, { type: mime || 'audio/ogg' });
                const ab = await recordedBlob.arrayBuffer();
                recordedBytes = new Uint8Array(ab);

                // Превью
                const url = URL.createObjectURL(recordedBlob);
                audioPreview.src = url;
                previewEl.classList.add('show');
                sendBtn.disabled = false;
                discardBtn.style.display = '';
                recordBtn.style.display = 'none';

                statusEl.textContent = 'Запись завершена (' + Math.round(recordedBytes.length / 1024) + ' КБ). Прослушайте и отправьте.';
                statusEl.className = 'status success';
            };

            mediaRecorder.start();
            isRecording = true;
            recordSeconds = 0;
            timerEl.textContent = '0:00';
            timerEl.classList.add('recording');
            recordBtn.classList.add('recording');
            recordBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
            recordBtn.title = 'Остановить запись';
            statusEl.textContent = 'Идёт запись...';
            statusEl.className = 'status';

            timerInterval = setInterval(function() {
                recordSeconds++;
                timerEl.textContent = formatTime(recordSeconds);
            }, 1000);
        } catch (e) {
            statusEl.textContent = 'Ошибка доступа к микрофону: ' + e.message;
            statusEl.className = 'status error';
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
        isRecording = false;
        timerEl.classList.remove('recording');
        recordBtn.classList.remove('recording');
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    recordBtn.addEventListener('click', function() {
        if (isRecording) stopRecording();
        else startRecording();
    });

    discardBtn.addEventListener('click', function() {
        // Перезапись
        recordedBlob = null;
        recordedBytes = null;
        audioPreview.src = '';
        previewEl.classList.remove('show');
        sendBtn.disabled = true;
        discardBtn.style.display = 'none';
        recordBtn.style.display = '';
        recordBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
        statusEl.textContent = 'Готово к записи';
        statusEl.className = 'status';
    });

    sendBtn.addEventListener('click', function() {
        if (!recordedBytes) return;
        sendBtn.disabled = true;
        statusEl.textContent = 'Шифрование и отправка...';
        statusEl.className = 'status';
        // Отправить байты в main process для шифрования и отправки в чат
        ipcRenderer.send('voice-recorder-send', {
            audioBytes: recordedBytes.buffer,
        });
    });

    cancelBtn.addEventListener('click', function() {
        if (isRecording) stopRecording();
        ipcRenderer.send('voice-recorder-close');
    });

    // Результат от main process
    ipcRenderer.on('voice-recorder-result', function(event, data) {
        if (data && data.success) {
            statusEl.textContent = 'Отправлено в чат ✓';
            statusEl.className = 'status success';
            setTimeout(function() {
                ipcRenderer.send('voice-recorder-close');
            }, 800);
        } else {
            statusEl.textContent = 'Ошибка: ' + (data && data.error || 'неизвестная');
            statusEl.className = 'status error';
            sendBtn.disabled = false;
        }
    });
})();
</script>

</body>
</html>
