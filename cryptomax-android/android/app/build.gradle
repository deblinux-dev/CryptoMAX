// Apply Capacitor's auto-generated build file FIRST (defines SDK versions)
def capacitorBuildFile = new File(rootProject.projectDir, 'capacitor.build.gradle')
if (capacitorBuildFile.exists()) {
    apply from: capacitorBuildFile
}

apply plugin: 'com.android.application'

android {
    namespace "com.cryptomax.app"
    compileSdk 36

    defaultConfig {
        applicationId "com.cryptomax.app"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    testOptions {
        unitTests.returnDefaultValues = true
    }

    lint {
        abortOnError false
        disable 'MissingTranslation'
    }

    packagingOptions {
        resources {
            excludes += ['META-INF/DEPENDENCIES', 'META-INF/LICENSE', 'META-INF/LICENSE.txt',
                         'META-INF/license.txt', 'META-INF/NOTICE', 'META-INF/NOTICE.txt',
                         'META-INF/notice.txt', 'META-INF/ASL2.0']
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    // ─── Capacitor 8.x ────────────────────────────────────
    implementation project(':capacitor-android')

    // ─── OkHttp 4.x (used by CryptoBridgePlugin for decryptTextFile) ─
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // ─── AndroidX core / UI ───────────────────────────────
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'androidx.core:core:1.13.1'
    implementation 'androidx.webkit:webkit:1.15.0'
    implementation 'androidx.activity:activity:1.9.3'
    implementation 'com.google.android.material:material:1.13.0'

    // ─── Test ──────────────────────────────────────────────
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}
